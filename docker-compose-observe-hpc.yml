services:
  prometheus:
    image: prom/prometheus:latest
    container_name: ${MAGE_HPC_PROM_CONTAINER:-mage-prometheus-hpc}
    ports:
      # Avoid clashing with RLTrainer host metrics port (9090)
      - "${MAGE_HPC_PROMETHEUS_PORT:-9091}:9090"
    volumes:
      - ${MAGE_HPC_PROM_CONFIG:-./monitoring/prometheus-hpc.yml}:/etc/prometheus/prometheus.yml:ro
      - ${MAGE_HPC_FILE_SD_DIR:-./monitoring/file_sd}:/etc/prometheus/file_sd:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=7d'
      - '--web.enable-lifecycle'
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: ${MAGE_HPC_GRAFANA_CONTAINER:-mage-grafana-hpc}
    ports:
      - "${MAGE_HPC_GRAFANA_PORT:-3000}:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin123
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  prometheus-data:
  grafana-data:
